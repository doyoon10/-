<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Memo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f4;
    --surface: #ffffff;
    --surface2: #f0efed;
    --border: rgba(0,0,0,0.10);
    --border-md: rgba(0,0,0,0.18);
    --text: #111110;
    --text2: #6b6b68;
    --text3: #a8a8a5;
    --sky: #e8f4fd;
    --sky-text: #1a6fa0;
    --sky-border: #b8d8f0;
    --green: #e8faf0;
    --green-text: #1a7a45;
    --red-bg: #fff0f0;
    --red: #d93025;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.10);
      --border-md: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --text2: #8c8c88;
      --text3: #5a5a57;
      --sky: #0d2030;
      --sky-text: #72bceb;
      --sky-border: #1a4060;
      --green: #0a2018;
      --green-text: #4fcf87;
      --red-bg: #2a0d0d;
      --red: #f87171;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .app { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .topbar-logo {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text);
  }
  .topbar-logo span { color: var(--text2); font-weight: 400; }
  .back-btn {
    background: none;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text2);
    font-size: 16px;
    padding: 6px 8px;
    display: flex;
    align-items: center;
    transition: all 0.15s;
  }
  .back-btn:hover { background: var(--surface2); color: var(--text); }
  .topbar-title { font-size: 17px; font-weight: 500; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-md);
    background: var(--surface);
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn i { font-size: 15px; }
  .btn-dark {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .btn-dark:hover { opacity: 0.85; color: var(--bg); }
  .btn-sky {
    background: var(--sky);
    color: var(--sky-text);
    border-color: var(--sky-border);
  }
  .btn-sky:hover { opacity: 0.85; }
  .btn-danger { color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); }

  /* ── PILL TAG ── */
  .pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text2);
    border: 0.5px solid var(--border);
  }
  .pill-sky { background: var(--sky); color: var(--sky-text); border-color: var(--sky-border); }
  .pill-green { background: var(--green); color: var(--green-text); border-color: transparent; }

  /* ── HOME ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-header h2 { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.3px; text-transform: uppercase; }

  .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
  .doc-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .doc-card:hover { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .doc-card-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-card-preview { font-size: 12px; color: var(--text3); line-height: 1.65; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 12px; }
  .doc-card-meta { display: flex; gap: 6px; align-items: center; }
  .doc-card-del {
    position: absolute;
    top: 10px; right: 10px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 14px; padding: 4px;
    border-radius: 4px; display: none;
    transition: color 0.15s;
  }
  .doc-card:hover .doc-card-del { display: flex; align-items: center; }
  .doc-card-del:hover { color: var(--red); }

  .new-card {
    border: 1.5px dashed var(--border-md);
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 120px;
    color: var(--text3);
  }
  .new-card:hover { border-color: var(--text2); color: var(--text2); background: var(--surface2); }
  .new-card i { font-size: 22px; }
  .new-card span { font-size: 13px; }

  /* ── EDITOR ── */
  .editor-layout { display: flex; flex-direction: column; gap: 14px; }
  .title-input {
    width: 100%;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.4px;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    padding: 0 0 10px;
    border-bottom: 1.5px solid var(--border);
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .title-input:focus { border-bottom-color: var(--border-md); }
  .title-input::placeholder { color: var(--text3); }

  .editor-toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .editor-toolbar .spacer { flex: 1; }

  .body-textarea {
    width: 100%;
    min-height: 280px;
    padding: 18px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.9;
    resize: vertical;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .body-textarea:focus { border-color: var(--border-md); }
  .body-textarea::placeholder { color: var(--text3); }

  .editor-footer { display: flex; align-items: center; justify-content: space-between; }
  .sent-count { font-size: 12px; color: var(--text3); }

  .translation-wrap { margin-top: 4px; }
  .translation-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .translation-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.85;
    color: var(--text2);
  }
  .translation-box.loading { opacity: 0.5; }

  /* ── MEMO SCREEN ── */
  .memo-tabs {
    display: flex;
    gap: 0;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-sm);
    overflow: hidden;
    width: fit-content;
    margin-bottom: 22px;
  }
  .memo-tab {
    padding: 7px 20px;
    font-size: 13px;
    cursor: pointer;
    background: var(--surface);
    border: none;
    color: var(--text2);
    transition: all 0.15s;
    font-family: inherit;
  }
  .memo-tab.active { background: var(--text); color: var(--bg); }
  .memo-content { display: none; }
  .memo-content.active { display: block; }

  /* READ TAB */
  .read-info {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 16px;
  }
  .read-view { display: flex; flex-direction: column; gap: 4px; }
  .read-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    transition: background 0.1s;
    cursor: default;
  }
  .read-row:hover { background: var(--surface2); }
  .read-num { font-size: 11px; color: var(--text3); min-width: 22px; padding-top: 3px; font-variant-numeric: tabular-nums; text-align: right; }
  .read-text { flex: 1; }
  .read-en { font-size: 14px; line-height: 1.8; }
  .read-kr { font-size: 12px; color: var(--text2); margin-top: 3px; display: none; }
  .read-row:hover .read-kr { display: block; }

  /* WRITE TAB */
  .write-info {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    line-height: 1.65;
  }
  .write-area { display: flex; flex-direction: column; gap: 8px; }
  .write-row { display: flex; gap: 10px; align-items: flex-start; }
  .write-num { font-size: 11px; color: var(--text3); min-width: 22px; padding-top: 11px; text-align: right; font-variant-numeric: tabular-nums; }
  .write-input {
    flex: 1;
    padding: 9px 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.75;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 44px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .write-input:focus { border-color: var(--border-md); }
  .write-input::placeholder { color: var(--text3); }

  .write-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

  /* RESULT */
  .result-summary {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin: 20px 0 14px;
  }
  .result-score-big { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  .result-score-label { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .result-emoji { font-size: 22px; }
  .result-msg { font-size: 14px; color: var(--text2); }

  .result-list { display: flex; flex-direction: column; gap: 10px; }
  .result-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
  }
  .result-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .result-item-num { font-size: 11px; color: var(--text3); }
  .result-original { font-size: 12px; color: var(--text2); margin-bottom: 6px; line-height: 1.7; padding: 6px 10px; background: var(--surface2); border-radius: var(--radius-sm); }
  .result-mine { font-size: 14px; line-height: 1.85; }
  .result-none { font-size: 13px; color: var(--text3); font-style: italic; }

  .char-ok { color: var(--text); }
  .char-err { color: var(--red); background: var(--red-bg); border-radius: 2px; padding: 0 1px; }
  .char-miss { color: var(--red); text-decoration: underline wavy; }

  .score-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .score-perfect { background: var(--green); color: var(--green-text); }
  .score-good { background: var(--sky); color: var(--sky-text); }
  .score-bad { background: var(--red-bg); color: var(--red); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 64px 0;
    color: var(--text3);
  }
  .empty i { font-size: 36px; display: block; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text);
    color: var(--bg);
    font-size: 13px;
    padding: 9px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">

  <!-- ════ HOME ════ -->
  <div id="homeScreen" class="screen active">
    <div class="topbar">
      <div class="topbar-logo">English Memo<span> — 영어 본문 암기</span></div>
    </div>
    <div class="section-header">
      <h2>내 문서</h2>
      <button class="btn btn-dark" onclick="openNewDoc()"><i class="ti ti-plus"></i>새 문서</button>
    </div>
    <div class="doc-grid" id="docGrid"></div>
  </div>

  <!-- ════ EDITOR ════ -->
  <div id="editorScreen" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goHome()" aria-label="홈으로"><i class="ti ti-arrow-left"></i></button>
      <div class="topbar-title" id="editorTopTitle">새 문서</div>
    </div>
    <div class="editor-layout">
      <input class="title-input" id="docTitleInput" placeholder="문서 제목" maxlength="60" oninput="onTitleInput()">

      <div class="editor-toolbar">
        <button class="btn btn-sky" onclick="translateDoc()"><i class="ti ti-language"></i>한국어 번역</button>
        <button class="btn" onclick="goMemorize()"><i class="ti ti-brain"></i>암기 모드</button>
        <div class="spacer"></div>
        <button class="btn btn-danger" onclick="deleteCurrentDoc()"><i class="ti ti-trash"></i></button>
        <button class="btn btn-dark" onclick="saveDoc()"><i class="ti ti-device-floppy"></i>저장</button>
      </div>

      <textarea
        class="body-textarea"
        id="bodyInput"
        placeholder="여기에 영어 본문을 입력하세요.&#10;마침표(.), 느낌표(!), 물음표(?)로 문장을 구분합니다."
        oninput="onBodyInput()"
        spellcheck="false"
      ></textarea>

      <div class="editor-footer">
        <span class="sent-count" id="sentCount">문장 0개</span>
        <span style="font-size:12px;color:var(--text3)">저장: Ctrl+S</span>
      </div>

      <div class="translation-wrap" id="translationWrap" style="display:none">
        <div class="translation-label"><i class="ti ti-language" style="font-size:14px"></i>한국어 번역</div>
        <div class="translation-box" id="translationBox"></div>
      </div>
    </div>
  </div>

  <!-- ════ MEMORIZE ════ -->
  <div id="memorizeScreen" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="showScreen('editorScreen')" aria-label="편집으로"><i class="ti ti-arrow-left"></i></button>
      <div class="topbar-title" id="memoTitle"></div>
    </div>

    <div class="memo-tabs">
      <button class="memo-tab active" id="tabRead" onclick="switchTab('read')"><i class="ti ti-book" style="font-size:14px;vertical-align:-1px"></i> 원문 보기</button>
      <button class="memo-tab" id="tabWrite" onclick="switchTab('write')"><i class="ti ti-pencil" style="font-size:14px;vertical-align:-1px"></i> 본문 적기</button>
    </div>

    <div id="readTab" class="memo-content active">
      <p class="read-info">문장 위에 마우스를 올리면 한국어 번역이 보여요.</p>
      <div class="read-view" id="readView"></div>
    </div>

    <div id="writeTab" class="memo-content">
      <div class="write-info">
        <i class="ti ti-info-circle" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>
        각 칸에 해당 문장을 외워서 적어보세요. 총 <strong id="writeSentTotal">0</strong>문장입니다.
      </div>
      <div class="write-area" id="writeArea"></div>
      <div class="write-actions">
        <button class="btn" onclick="resetWrite()"><i class="ti ti-refresh"></i>초기화</button>
        <button class="btn btn-dark" onclick="submitWrite()"><i class="ti ti-send"></i>채점하기</button>
      </div>
      <div id="resultArea"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────
const LS_KEY = 'english_memo_docs';
let docs = [];
let currentId = null;

function loadDocs() {
  try { docs = JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch(e) { docs = []; }
}
function saveDocs() {
  localStorage.setItem(LS_KEY, JSON.stringify(docs));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── SENTENCES ──────────────────────────────────────
function parseSentences(text) {
  if (!text || !text.trim()) return [];
  const matches = text.match(/[^.!?]+[.!?]+/g) || [];
  const sents = matches.map(s => s.trim()).filter(s => s.length > 1);
  const rest = text.replace(/[^.!?]+[.!?]+/g, '').trim();
  if (rest.length > 1) sents.push(rest);
  return sents;
}

// ── SCREENS ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── HOME ───────────────────────────────────────────
function renderHome() {
  const grid = document.getElementById('docGrid');
  const realDocs = docs.filter(d => d.body || d.title);

  if (realDocs.length === 0) {
    grid.innerHTML = `
      <div class="doc-card new-card" onclick="openNewDoc()">
        <i class="ti ti-plus"></i>
        <span>첫 문서 만들기</span>
      </div>`;
    return;
  }

  let html = `<div class="doc-card new-card" onclick="openNewDoc()"><i class="ti ti-plus"></i><span>새 문서</span></div>`;
  [...realDocs].reverse().forEach(d => {
    const n = parseSentences(d.body).length;
    html += `
      <div class="doc-card" onclick="openDoc('${d.id}')">
        <button class="doc-card-del" onclick="event.stopPropagation();deleteDoc('${d.id}')" aria-label="삭제"><i class="ti ti-x"></i></button>
        <div class="doc-card-title">${esc(d.title || '제목 없음')}</div>
        <div class="doc-card-preview">${esc(d.body.slice(0, 90))}</div>
        <div class="doc-card-meta">
          <span class="pill">${n}문장</span>
          ${d.translation ? '<span class="pill pill-sky">번역완료</span>' : ''}
        </div>
      </div>`;
  });
  grid.innerHTML = html;
}

function openNewDoc() {
  const doc = { id: uid(), title: '', body: '', translation: '', createdAt: Date.now() };
  docs.push(doc);
  saveDocs();
  currentId = doc.id;
  loadEditor(doc);
  showScreen('editorScreen');
}

function openDoc(id) {
  currentId = id;
  const doc = docs.find(d => d.id === id);
  if (doc) { loadEditor(doc); showScreen('editorScreen'); }
}

// ── EDITOR ─────────────────────────────────────────
function loadEditor(doc) {
  document.getElementById('docTitleInput').value = doc.title || '';
  document.getElementById('bodyInput').value = doc.body || '';
  document.getElementById('editorTopTitle').textContent = doc.title || '새 문서';
  updateSentCount();
  if (doc.translation) {
    document.getElementById('translationWrap').style.display = 'block';
    document.getElementById('translationBox').textContent = doc.translation;
  } else {
    document.getElementById('translationWrap').style.display = 'none';
  }
}

function onTitleInput() {
  document.getElementById('editorTopTitle').textContent =
    document.getElementById('docTitleInput').value || '새 문서';
}

function onBodyInput() { updateSentCount(); }

function updateSentCount() {
  const val = document.getElementById('bodyInput').value;
  const n = parseSentences(val).length;
  document.getElementById('sentCount').textContent = `문장 ${n}개`;
}

function saveDoc() {
  const doc = docs.find(d => d.id === currentId);
  if (!doc) return;
  doc.title = document.getElementById('docTitleInput').value.trim() || '제목 없음';
  doc.body = document.getElementById('bodyInput').value.trim();
  saveDocs();
  renderHome();
  toast('저장했어요 ✓');
}

function deleteCurrentDoc() {
  if (!confirm('이 문서를 삭제할까요?')) return;
  docs = docs.filter(d => d.id !== currentId);
  saveDocs();
  renderHome();
  showScreen('homeScreen');
}

function deleteDoc(id) {
  if (!confirm('이 문서를 삭제할까요?')) return;
  docs = docs.filter(d => d.id !== id);
  saveDocs();
  renderHome();
}

function goHome() {
  saveDoc();
  renderHome();
  showScreen('homeScreen');
}

// Ctrl+S 저장
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    const screen = document.querySelector('.screen.active');
    if (screen && screen.id === 'editorScreen') saveDoc();
  }
});

// ── TRANSLATION ────────────────────────────────────
async function translateDoc() {
  const body = document.getElementById('bodyInput').value.trim();
  if (!body) { toast('먼저 영어 본문을 입력해주세요.'); return; }

  const btn = event.currentTarget;
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2"></i>번역 중...';

  document.getElementById('translationWrap').style.display = 'block';
  const box = document.getElementById('translationBox');
  box.textContent = '번역하는 중...';
  box.classList.add('loading');

  try {
    const sents = parseSentences(body);
    const results = [];
    for (const s of sents) {
      const res = await fetch(
        `https://api.mymemory.translated.net/get?q=${encodeURIComponent(s)}&langpair=en|ko`
      );
      const data = await res.json();
      results.push(data.responseData?.translatedText || s);
    }
    const translated = results.join(' ');
    box.textContent = translated;
    box.classList.remove('loading');

    const doc = docs.find(d => d.id === currentId);
    if (doc) { doc.translation = translated; saveDocs(); }
  } catch(e) {
    box.textContent = '번역 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.';
    box.classList.remove('loading');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-language"></i>한국어 번역';
}

// ── MEMORIZE ───────────────────────────────────────
function goMemorize() {
  const doc = docs.find(d => d.id === currentId);
  if (!doc) return;
  doc.title = document.getElementById('docTitleInput').value.trim() || '제목 없음';
  doc.body = document.getElementById('bodyInput').value.trim();
  saveDocs();

  if (!doc.body) { toast('본문을 먼저 입력해주세요.'); return; }

  document.getElementById('memoTitle').textContent = doc.title;
  renderReadTab(doc);
  renderWriteTab(doc);
  switchTab('read');
  showScreen('memorizeScreen');
}

function renderReadTab(doc) {
  const sents = parseSentences(doc.body);
  const krs = doc.translation ? parseSentences(doc.translation) : [];
  document.getElementById('readView').innerHTML = sents.map((s, i) => `
    <div class="read-row">
      <span class="read-num">${i + 1}</span>
      <div class="read-text">
        <div class="read-en">${esc(s)}</div>
        ${krs[i] ? `<div class="read-kr">${esc(krs[i])}</div>` : ''}
      </div>
    </div>`).join('');
}

function renderWriteTab(doc) {
  const sents = parseSentences(doc.body);
  document.getElementById('writeSentTotal').textContent = sents.length;
  document.getElementById('writeArea').innerHTML = sents.map((s, i) => `
    <div class="write-row">
      <span class="write-num">${i + 1}</span>
      <textarea
        class="write-input"
        id="wi_${i}"
        placeholder="문장 ${i + 1} · ${s.length}자"
        rows="1"
        oninput="autoResize(this)"
        spellcheck="false"
      ></textarea>
    </div>`).join('');
  document.getElementById('resultArea').innerHTML = '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function switchTab(tab) {
  document.getElementById('tabRead').classList.toggle('active', tab === 'read');
  document.getElementById('tabWrite').classList.toggle('active', tab === 'write');
  document.getElementById('readTab').classList.toggle('active', tab === 'read');
  document.getElementById('writeTab').classList.toggle('active', tab === 'write');
}

function resetWrite() {
  const doc = docs.find(d => d.id === currentId);
  if (!doc) return;
  parseSentences(doc.body).forEach((_, i) => {
    const el = document.getElementById('wi_' + i);
    if (el) { el.value = ''; el.style.height = 'auto'; }
  });
  document.getElementById('resultArea').innerHTML = '';
}

function submitWrite() {
  const doc = docs.find(d => d.id === currentId);
  if (!doc) return;
  const sents = parseSentences(doc.body);
  let total = 0;

  const items = sents.map((s, i) => {
    const inp = (document.getElementById('wi_' + i)?.value || '').trim();
    const sim = calcSim(s, inp);
    total += sim;
    return { s, inp, sim };
  });

  const avg = Math.round(total / sents.length);
  const scoreClass = avg === 100 ? 'score-perfect' : avg >= 70 ? 'score-good' : 'score-bad';
  const emoji = avg === 100 ? '🎉' : avg >= 70 ? '👍' : '💪';
  const msg = avg === 100 ? '완벽해요! 다 외웠어요.' : avg >= 70 ? '거의 다 맞았어요!' : '조금 더 연습해봐요.';

  const resultItems = items.map((it, i) => {
    const cls = it.sim === 100 ? 'score-perfect' : it.sim >= 70 ? 'score-good' : 'score-bad';
    const label = it.sim === 100 ? '완벽' : it.sim >= 70 ? '거의 맞음' : '틀림';
    return `
      <div class="result-item">
        <div class="result-item-header">
          <span class="result-item-num">문장 ${i + 1}</span>
          <span class="score-pill ${cls}">${label} ${it.sim}%</span>
        </div>
        <div class="result-original">정답: ${esc(it.s)}</div>
        <div class="result-mine">${it.inp ? diffHtml(it.s, it.inp) : '<span class="result-none">입력 없음</span>'}</div>
      </div>`;
  }).join('');

  document.getElementById('resultArea').innerHTML = `
    <div class="result-summary">
      <div>
        <div class="result-score-big">${avg}<span style="font-size:16px;font-weight:400">%</span></div>
        <div class="result-score-label">종합 점수</div>
      </div>
      <div style="font-size:22px">${emoji}</div>
      <div class="result-msg">${msg}</div>
    </div>
    <div class="result-list">${resultItems}</div>`;

  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── DIFF ────────────────────────────────────────────
function diffHtml(orig, inp) {
  let html = '';
  for (let i = 0; i < inp.length; i++) {
    if (i < orig.length) {
      html += inp[i] === orig[i]
        ? `<span class="char-ok">${esc(inp[i])}</span>`
        : `<span class="char-err">${esc(inp[i])}</span>`;
    } else {
      html += `<span class="char-err">${esc(inp[i])}</span>`;
    }
  }
  if (inp.length < orig.length) {
    html += `<span class="char-miss">${esc(orig.slice(inp.length))}</span>`;
  }
  return html;
}

function calcSim(a, b) {
  const s1 = a.trim().toLowerCase(), s2 = b.trim().toLowerCase();
  if (s1 === s2) return 100;
  let m = 0;
  for (let i = 0; i < Math.min(s1.length, s2.length); i++) if (s1[i] === s2[i]) m++;
  return Math.round(m / Math.max(s1.length, s2.length) * 100);
}

// ── UTILS ───────────────────────────────────────────
function esc(t) {
  return String(t)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── INIT ────────────────────────────────────────────
loadDocs();
renderHome();
</script>
</body>
</html>
